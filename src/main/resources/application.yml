spring:
  application:
    name: ac-ai-code-free-backend
    # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ac_ai_code_free
    username: root
    password: 123456
  profiles:
    active: local #使用local本地环境
server:
  port: 8700
  servlet:
    context-path: /api
    session:
      timeout: 1d

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.adcage.acaicodefree.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      max-tokens: 8192
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      max-tokens: 8192

app:
  ai:
    vue-project:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      dev-model-name: deepseek-chat
      prod-model-name: deepseek-reasoner
      dev-max-tokens: 8192
      prod-max-tokens: 32768
      memory-window-size: 20
      install-timeout-seconds: 300
      build-timeout-seconds: 180
  screenshot:
    temp-dir: ${user.dir}/temp/screenshots
    width: 1600
    height: 900
    wait-after-load-millis: 2000
    compression-quality: 0.3
    upload-prefix: /screenshots

cos:
  client:
    host: ${COS_HOST:https://your-cdn-or-cos-domain.com}
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-shanghai}
    bucket: ${COS_BUCKET:}
